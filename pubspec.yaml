name: website
description: "A new Flutter project."
publish_to: "none"

version: 0.0.1+1

environment:
  sdk: ">=3.4.1 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.6
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.4
  flutter_riverpod: ^2.5.1
  flutter_web_plugins:
    sdk: flutter
  freezed_annotation: ^2.4.4
  go_router: ^14.3.0
  http: ^1.2.2
  json_annotation: ^4.9.0
  riverpod_annotation: ^2.3.5
  url_launcher: ^6.3.1

dev_dependencies:
  build_runner: ^2.4.11
  custom_lint: ^0.6.4
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.2
  go_router_builder: ^2.7.1
  json_serializable: ^6.8.0
  lint: ^2.3.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - index/

  fonts:
    - family: AtkinsonHyperlegible
      fonts:
      - asset: fonts/AtkinsonHyperlegible-Bold.ttf
        weight: 700
      - asset: fonts/AtkinsonHyperlegible-BoldItalic.ttf
        weight: 700
        style: italic
      - asset: fonts/AtkinsonHyperlegible-Italic.ttf
        style: italic
      - asset: fonts/AtkinsonHyperlegible-Regular.ttf
